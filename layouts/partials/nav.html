<!-- Main nav -->
<header id="site-header"
  class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 {{ if .IsHome }}bg-transparent border-transparent shadow-none{{ else }}bg-white border-b border-slate-200 shadow-sm{{ end }}"
  {{ if .IsHome }}data-transparent="true"{{ end }}>
  <nav class="max-w-7xl mx-auto px-6 py-0 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-3 shrink-0">
      <span id="nav-brand" class="font-bold text-lg tracking-tight transition-colors duration-300 {{ if .IsHome }}text-white{{ else }}text-slate-900{{ end }}">{{ .Site.Params.author | default .Site.Title }}</span>
      <span class="hidden sm:block h-5 w-px bg-slate-300"></span>
      <span id="nav-tagline" class="hidden sm:block text-xs font-medium uppercase tracking-widest transition-colors duration-300 {{ if .IsHome }}text-slate-300{{ else }}text-slate-500{{ end }}">{{ .Site.Params.nav_tagline | default "Consultant" }}</span>
    </a>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-8 text-sm font-medium">
      <li><a href="/about" id="nav-link-about" class="transition-colors duration-300 py-5 border-b-2 border-transparent hover:border-blue-400 {{ if .IsHome }}text-slate-200 hover:text-white{{ else }}text-slate-600 hover:text-blue-700{{ end }}">About</a></li>
      <li><a href="/projects" id="nav-link-projects" class="transition-colors duration-300 py-5 border-b-2 border-transparent hover:border-blue-400 {{ if .IsHome }}text-slate-200 hover:text-white{{ else }}text-slate-600 hover:text-blue-700{{ end }}">Projects</a></li>
      <li><a href="/posts" id="nav-link-posts" class="transition-colors duration-300 py-5 border-b-2 border-transparent hover:border-blue-400 {{ if .IsHome }}text-slate-200 hover:text-white{{ else }}text-slate-600 hover:text-blue-700{{ end }}">Insights</a></li>
      <li>
        <a href="/contact"
          class="ml-2 inline-flex items-center px-5 py-2 bg-blue-700 text-white text-sm font-semibold rounded hover:bg-blue-600 transition-colors">
          Get in touch
        </a>
      </li>
    </ul>

    <!-- Hamburger (mobile) -->
    <button id="nav-toggle" aria-label="Toggle menu" aria-expanded="false"
      class="md:hidden flex items-center justify-center w-10 h-10 rounded transition-colors {{ if .IsHome }}text-white hover:bg-white/10{{ else }}text-slate-600 hover:text-slate-900 hover:bg-slate-100{{ end }}">
      <i data-lucide="menu" class="w-5 h-5" id="nav-icon-open"></i>
      <i data-lucide="x" class="w-5 h-5 hidden" id="nav-icon-close"></i>
    </button>
  </nav>

  <!-- Mobile drawer -->
  <div id="nav-drawer" class="hidden md:hidden border-t border-slate-200 bg-white">
    <ul class="flex flex-col px-6 py-4 gap-1 text-sm font-medium text-slate-600">
      <li><a href="/about" class="block py-3 border-b border-slate-100 hover:text-blue-700 transition-colors">About</a></li>
      <li><a href="/projects" class="block py-3 border-b border-slate-100 hover:text-blue-700 transition-colors">Projects</a></li>
      <li><a href="/posts" class="block py-3 border-b border-slate-100 hover:text-blue-700 transition-colors">Insights</a></li>
      <li class="pt-3">
        <a href="/contact"
          class="flex items-center justify-center px-5 py-2.5 bg-blue-700 text-white font-semibold rounded hover:bg-blue-800 transition-colors">
          Get in touch
        </a>
      </li>
    </ul>
  </div>
</header>
