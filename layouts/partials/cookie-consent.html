<div id="cookie-banner" class="hidden fixed bottom-0 inset-x-0 z-50 bg-white border-t border-slate-200 shadow-lg">
  <div class="max-w-4xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-start sm:items-center gap-4 justify-between">
    <p class="text-sm text-slate-600">
      This site uses cookies to analyse traffic via Google Analytics.
      See our <a href="/privacy" class="underline hover:text-slate-900 transition">privacy policy</a>.
    </p>
    <div class="flex gap-3 shrink-0">
      <button id="cookie-decline" class="px-4 py-2 text-sm border border-slate-300 rounded hover:bg-slate-50 transition">Decline</button>
      <button id="cookie-accept" class="px-4 py-2 text-sm bg-slate-800 text-white rounded hover:bg-slate-700 transition">Accept</button>
    </div>
  </div>
</div>
