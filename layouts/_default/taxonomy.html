{{ define "main" }}
{{ partial "page-header.html" (dict "label" "taxonomy" "title" .Title) }}
<section class="max-w-3xl mx-auto px-6 py-20">
  <ul class="space-y-4">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}" class="text-slate-700 hover:text-blue-700 transition-colors">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</section>
{{ end }}
