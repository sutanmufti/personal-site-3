{{ define "main" }}
<section class="max-w-3xl mx-auto px-6 py-24">
  <h1 class="text-4xl font-bold tracking-tight text-stone-50 mb-12">{{ .Title }}</h1>
  <ul class="space-y-4">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}" class="text-stone-300 hover:text-amber-400 transition-colors">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</section>
{{ end }}
