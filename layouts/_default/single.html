{{ define "main" }}

{{ partial "page-header.html" (dict "label" (.Date.Format "2 January 2006") "title" .Title) }}

{{ with .Params.featured_image }}
{{ $img := $.Resources.GetMatch . }}
{{ if $img }}
<div class="max-w-4xl mx-auto px-6 -mt-8">
  <img src="{{ $img.RelPermalink }}" alt="{{ $.Title }}"
    class="w-full max-h-[480px] object-cover rounded-lg shadow-lg" />
</div>
{{ end }}
{{ end }}

<article class="max-w-3xl mx-auto px-6 py-20">
  <div class="prose prose-slate prose-lg max-w-none
    prose-headings:font-bold prose-headings:tracking-tight prose-headings:text-slate-900
    prose-a:text-blue-700 prose-a:no-underline hover:prose-a:underline
    prose-strong:text-slate-900
    prose-code:text-blue-700 prose-code:bg-blue-50 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-sm
    prose-pre:bg-slate-900 prose-pre:text-slate-100 prose-pre:border prose-pre:border-slate-700">
    {{ .Content }}
  </div>

  <div class="mt-16 pt-8 border-t border-slate-200">
    <a href="/posts" class="text-sm font-semibold text-blue-700 hover:text-blue-900 transition-colors">← All posts</a>
  </div>
</article>

{{ end }}
