{{ define "main" }}

<section class="bg-slate-900 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20 md:py-28">
    <p class="text-xs font-semibold uppercase tracking-widest text-blue-400 mb-4">{{ .Section | default "archive" }}</p>
    <h1 class="text-4xl md:text-5xl font-bold tracking-tight">{{ .Title }}</h1>
  </div>
</section>

<section class="max-w-7xl mx-auto px-6 py-20">
  <ul class="divide-y divide-slate-200">
    {{ range .Pages }}
    <li class="group py-8 first:pt-0">
      <a href="{{ .RelPermalink }}" class="flex items-start justify-between gap-8">
        <div>
          <h2 class="text-lg font-bold text-slate-900 group-hover:text-blue-700 transition-colors mb-2">{{ .Title }}</h2>
          {{ with .Summary }}
          <p class="text-sm text-slate-500 leading-relaxed">{{ . }}</p>
          {{ end }}
        </div>
        <span class="font-mono text-xs text-slate-400 shrink-0 mt-1">{{ .Date.Format "2 Jan 2006" }}</span>
      </a>
    </li>
    {{ end }}
  </ul>
</section>

{{ end }}
