{{ define "main" }}
<section class="max-w-3xl mx-auto px-6 py-24">
  <header class="mb-12">
    <p class="font-mono text-xs text-amber-400 tracking-widest uppercase mb-4">{{ .Section | default "archive" }}</p>
    <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-stone-50">{{ .Title }}</h1>
  </header>

  <ul class="space-y-8">
    {{ range .Pages }}
    <li class="group border-b border-stone-800/60 pb-8 last:border-0">
      <a href="{{ .RelPermalink }}" class="block">
        <div class="flex items-start justify-between gap-4 mb-2">
          <h2 class="text-stone-200 group-hover:text-amber-400 transition-colors font-medium text-lg">{{ .Title }}</h2>
          <span class="font-mono text-xs text-stone-600 shrink-0 mt-1.5">{{ .Date.Format "2006-01-02" }}</span>
        </div>
        {{ with .Summary }}
        <p class="text-sm text-stone-500">{{ . }}</p>
        {{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
